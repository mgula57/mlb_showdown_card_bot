name: Snapshot Rosters

on:
  schedule:
    - cron: "0 4 * * *"   # 4:00 AM UTC daily
  workflow_dispatch:        # allow manual runs from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL_LOGS: ${{ secrets.DATABASE_URL_LOGS }}
      DATABASE_URL_ARCHIVE: ${{ secrets.DATABASE_URL_ARCHIVE }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Snapshot 2026 rosters and generate cards
        run: |
          showdown_bot database snapshot_rosters \
            --seasons 2026 \
            --publish_to_database \
            --generate-cards \

      - name: Run Auto Image Update
        run: |
          showdown_bot database run --auto_im

      - name: Refresh Explore Materialized Views
        run: |
          showdown_bot database run --refresh_explore